<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisfredo — Profil</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profil.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>html, body { background: #FAF6F1; }</style>
</head>
<body>

    <div class="profil-page">
        <div class="profil-container">

            <!-- ===== AUTH FORM (pas connecté) ===== -->
            <div id="authSection">
                <div class="profil-logo">✦</div>
                <h1 class="profil-title">Revisfredo</h1>
                <p class="profil-sub">Connecte-toi pour sauvegarder tes résultats</p>

                <!-- Tabs -->
                <div class="profil-tabs">
                    <button class="profil-tab active" id="tabLogin">Connexion</button>
                    <button class="profil-tab" id="tabSignup">Inscription</button>
                </div>

                <!-- Error / Success -->
                <div class="profil-error" id="authError"></div>
                <div class="profil-success" id="authSuccess"></div>

                <!-- LOGIN FORM -->
                <form class="profil-form active" id="loginForm">
                    <div class="profil-input-group">
                        <label>Email</label>
                        <input type="email" class="profil-input" id="loginEmail" placeholder="ton@email.com" required>
                    </div>
                    <div class="profil-input-group">
                        <label>Mot de passe</label>
                        <input type="password" class="profil-input" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="profil-submit" id="loginBtn">Se connecter</button>
                </form>

                <!-- SIGNUP FORM -->
                <form class="profil-form" id="signupForm">
                    <div class="profil-input-group">
                        <label>Prénom</label>
                        <input type="text" class="profil-input" id="signupName" placeholder="Ton prénom" required>
                    </div>
                    <div class="profil-input-group">
                        <label>Email</label>
                        <input type="email" class="profil-input" id="signupEmail" placeholder="ton@email.com" required>
                    </div>
                    <div class="profil-input-group">
                        <label>Mot de passe</label>
                        <input type="password" class="profil-input" id="signupPassword" placeholder="Minimum 6 caractères" required minlength="6">
                    </div>
                    <button type="submit" class="profil-submit" id="signupBtn">Créer mon compte</button>
                </form>
            </div>

            <!-- ===== DASHBOARD (connecté) ===== -->
            <div class="profil-dashboard" id="dashSection">
                <div class="profil-avatar" id="avatarLetter">L</div>
                <h2 class="profil-user-name" id="userName">—</h2>
                <p class="profil-user-email" id="userEmail">—</p>

                <div class="profil-stats">
                    <div class="profil-stat">
                        <div class="profil-stat-num" id="statQuiz">0</div>
                        <div class="profil-stat-label">Quiz faits</div>
                    </div>
                    <div class="profil-stat">
                        <div class="profil-stat-num" id="statAvg">0%</div>
                        <div class="profil-stat-label">Moyenne</div>
                    </div>
                    <div class="profil-stat">
                        <div class="profil-stat-num" id="statStreak">0</div>
                        <div class="profil-stat-label">Streak</div>
                    </div>
                </div>

                <div class="profil-actions">
                    <a href="fiches.html" class="profil-action-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        Réviser
                    </a>
                    <a href="resultats.html" class="profil-action-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        Mes résultats
                    </a>
                    <button class="profil-action-btn danger" id="logoutBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Déconnexion
                    </button>
                </div>
            </div>

            <a href="index.html" class="profil-back">← Retour à l'accueil</a>

        </div>
    </div>

    <script type="module">
        import { auth, db, saveProfile, loadProfile, loadQuizResults, loadStreak } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const authSection = document.getElementById('authSection');
        const dashSection = document.getElementById('dashSection');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');

        // --- TABS ---
        document.getElementById('tabLogin').addEventListener('click', () => {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabSignup').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('signupForm').classList.remove('active');
            hideMessages();
        });

        document.getElementById('tabSignup').addEventListener('click', () => {
            document.getElementById('tabSignup').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('signupForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            hideMessages();
        });

        function hideMessages() {
            authError.classList.remove('show');
            authSuccess.classList.remove('show');
        }

        function showError(msg) {
            authError.textContent = msg;
            authError.classList.add('show');
            authSuccess.classList.remove('show');
        }

        function showSuccess(msg) {
            authSuccess.textContent = msg;
            authSuccess.classList.add('show');
            authError.classList.remove('show');
        }

        // --- INSCRIPTION ---
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            document.getElementById('signupBtn').disabled = true;
            hideMessages();

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await saveProfile(cred.user.uid, { name: name, email: email });
                showSuccess('Compte créé avec succès !');
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    showError('Cet email est déjà utilisé.');
                } else if (err.code === 'auth/weak-password') {
                    showError('Le mot de passe doit contenir au moins 6 caractères.');
                } else if (err.code === 'auth/invalid-email') {
                    showError('Adresse email invalide.');
                } else {
                    showError('Erreur : ' + err.message);
                }
            }
            document.getElementById('signupBtn').disabled = false;
        });

        // --- CONNEXION ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            document.getElementById('loginBtn').disabled = true;
            hideMessages();

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                    showError('Email ou mot de passe incorrect.');
                } else if (err.code === 'auth/wrong-password') {
                    showError('Mot de passe incorrect.');
                } else {
                    showError('Erreur : ' + err.message);
                }
            }
            document.getElementById('loginBtn').disabled = false;
        });

        // --- DÉCONNEXION ---
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
        });

        // --- AUTH STATE ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authSection.style.display = 'none';
                dashSection.classList.add('active');

                const profile = await loadProfile(user.uid);
                const name = profile?.name || user.email.split('@')[0];
                document.getElementById('userName').textContent = name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('avatarLetter').textContent = name.charAt(0).toUpperCase();

                // Stats
                const results = await loadQuizResults(user.uid);
                document.getElementById('statQuiz').textContent = results.length;

                if (results.length > 0) {
                    const avg = Math.round(results.reduce((s, r) => s + r.percentage, 0) / results.length);
                    document.getElementById('statAvg').textContent = avg + '%';
                }

                const streakData = await loadStreak(user.uid);
                if (streakData) {
                    document.getElementById('statStreak').textContent = streakData.count || 0;
                }
            } else {
                authSection.style.display = 'block';
                dashSection.classList.remove('active');
            }
        });
    </script>

</body>
</html>
