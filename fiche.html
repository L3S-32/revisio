<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisfredo — Fiche</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fiche.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>html, body { background: #FAF6F1; }</style>
</head>
<body>

    <div class="fiche-page">

        <!-- TOP BAR -->
        <div class="fiche-topbar">
            <p class="fiche-module-label" id="ficheModuleLabel">MODULE</p>
        </div>

        <!-- LAYOUT 2 COLONNES -->
        <div class="fiche-layout">

            <!-- SIDEBAR GAUCHE -->
            <div class="fiche-sidebar">
                <div class="fiche-search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" placeholder="Rechercher..." id="ficheSearchInput">
                </div>
                <div class="fiche-list" id="ficheList"></div>
            </div>

            <!-- CONTENU DROITE -->
            <div class="fiche-main">
                <div class="fiche-card-container">
                    <!-- Header -->
                    <div class="fiche-card-header">
                        <span class="fiche-card-badge" id="ficheBadge">MODULE</span>
                        <div class="fiche-card-actions">
                            <div class="rev-switch-wrap">
                                <span class="rev-switch-label">Révision</span>
                                <label class="rev-switch">
                                    <input type="checkbox" id="btnRevisionMode">
                                    <span class="rev-switch-slider"></span>
                                </label>
                            </div>
                            <button id="btnNext" title="Fiche suivante">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                            </button>
                            <button id="btnBack" title="Retour au module">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 8 8 12 12 16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>
                            </button>
                        </div>
                    </div>
                    <!-- Body -->
                    <div class="fiche-card-body" id="ficheCardBody">
                        <h1 class="fiche-card-title" id="ficheCardTitle">—</h1>
                        <p class="fiche-card-meta" id="ficheCardMeta">—</p>
                        <div id="ficheCardContent"></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- RETOUR -->
        <div class="fiche-back-bar">
            <a href="#" class="fiche-back-btn" id="ficheBackBtn">Retour <span>←</span></a>
        </div>

    </div>

    <!-- MODAL MOT DE PASSE RÉVISION -->
    <div class="rev-pwd-modal" id="revPwdModal">
        <div class="rev-pwd-backdrop" id="revPwdBackdrop"></div>
        <div class="rev-pwd-content">
            <div class="rev-pwd-icon">🔒</div>
            <h3>Mode Révision</h3>
            <p>Entre le mot de passe pour débloquer ce mode.</p>
            <input type="password" id="revPwdInput" placeholder="Mot de passe..." autocomplete="off">
            <p class="rev-pwd-error" id="revPwdError"></p>
            <button class="rev-pwd-btn" id="revPwdSubmit">Débloquer</button>
        </div>
    </div>

    <script type="module">
    import { auth, db, onAuthStateChanged, doc, getDoc, updateDoc, setDoc } from './js/firebase-config.js';

    let currentUser = null;
    let revisionUnlocked = localStorage.getItem('revisionUnlocked') === '1';

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            const snap = await getDoc(doc(db, 'users', user.uid));
            if (snap.exists() && snap.data().revisionUnlocked) {
                revisionUnlocked = true;
                localStorage.setItem('revisionUnlocked', '1');
            }
        }
    });

    const params = new URLSearchParams(window.location.search);
    const moduleName = params.get('name') || 'Module';
    const moduleCode = params.get('code') || '';

    document.getElementById('ficheModuleLabel').textContent = moduleCode ? `${moduleCode} · ${moduleName}` : moduleName.toUpperCase();
    document.getElementById('ficheBadge').textContent = moduleCode || moduleName.toUpperCase();
    document.title = `Revisfredo — ${moduleName}`;

    // Retour
    document.getElementById('ficheBackBtn').addEventListener('click', e => {
        e.preventDefault();
        window.location.href = `module.html?name=${encodeURIComponent(moduleName)}&code=${encodeURIComponent(moduleCode)}`;
    });
    document.getElementById('btnBack').addEventListener('click', () => {
        window.location.href = `module.html?name=${encodeURIComponent(moduleName)}&code=${encodeURIComponent(moduleCode)}`;
    });

    // ============================
    // DONNÉES DES FICHES
    // ============================
    const fichesData = {

    'Infrastructure réseau': [],
    'Protection des données': [],
    'Modélisation de données': [
        {
            title: 'Environnement Oracle',
            time: '4 min',
            sections: [
                { heading: 'Résumé', html: `
                    <p>Oracle ne s'installe pas directement comme MySQL : il tourne dans un <strong>conteneur Docker</strong> (Oracle XE), géré via <strong>Docker Desktop</strong> (qui dépend de WSL sur Windows). Il faut démarrer Docker avant toute commande, et basculer MySQL→Oracle en début de journée.</p>
                    <p>On interagit avec la base via <strong>SQL Developer</strong>, dans lequel on crée deux connexions distinctes avec l'utilisateur <span class="hl">system</span> / mot de passe <span class="hl">manager</span> :</p>
                    <div class="fiche-table-wrap"><table>
                        <thead><tr><th>Connexion</th><th>Type</th><th>Valeur</th></tr></thead>
                        <tbody>
                            <tr><td><strong>CDB</strong></td><td>SID</td><td><span class="hl">XE</span></td></tr>
                            <tr><td><strong>PDB</strong></td><td>Service Name</td><td><span class="hl">XEPDB1</span></td></tr>
                        </tbody>
                    </table></div>
                    <p><strong>Différence clé Oracle vs MySQL</strong> : en MySQL, <span class="hl">CREATE DATABASE ≈ CREATE SCHEMA</span>. En Oracle, une seule instance physique contient plusieurs schémas, et un <strong>schéma = un utilisateur</strong> (relation 1:1). Créer un utilisateur <span class="hl">magasin</span> crée automatiquement le schéma <span class="hl">magasin</span>. Pour pointer vers un objet d'un autre schéma : <span class="hl">magasin.client</span>.</p>
                    <p>Outils annexes : <span class="hl">winget</span> pour installer SQL Developer, <span class="hl">PURGE RECYCLE BIN</span> pour vider la corbeille Oracle (objets nommés BIN…), et le script de suppression global à exécuter depuis SYSTEM pour repartir propre.</p>
                    <div class="fiche-video-lock" id="videoLock">
                        <div class="video-placeholder">
                            <div class="video-blur-overlay"></div>
                            <div class="video-lock-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                <p>Vidéo verrouillée</p>
                                <button class="video-unlock-btn" onclick="promptVideoPassword(this)">Déverrouiller</button>
                            </div>
                        </div>
                        <div class="video-content" style="display:none;"></div>
                    </div>` }
            ]
        }
    ],
    'C++': [],
    'Sciences appliquées': []

    };

    // ============================
    // RENDU DYNAMIQUE
    // ============================
    const ficheList = document.getElementById('ficheList');
    const cardTitle = document.getElementById('ficheCardTitle');
    const cardMeta = document.getElementById('ficheCardMeta');
    const cardContent = document.getElementById('ficheCardContent');

    const fiches = fichesData[moduleName] || [];
    let activeIndex = 0;

    if (fiches.length === 0) {
        ficheList.innerHTML = '<p style="padding:16px;color:var(--text-muted);font-size:14px;">Aucune fiche disponible pour ce module.</p>';
        cardTitle.textContent = 'Pas encore de contenu';
        cardMeta.textContent = '';
        cardContent.innerHTML = '<p>Le contenu sera bientôt ajouté.</p>';
    } else {
        // Construire la sidebar
        fiches.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'fiche-list-item' + (i === 0 ? ' active' : '');
            div.innerHTML = `
                <h4>${f.title}</h4>
                <div class="fiche-list-meta">
                    <span class="meta-dot"></span>
                    ${moduleName} · ${f.time}
                </div>
            `;
            div.addEventListener('click', () => showFiche(i));
            ficheList.appendChild(div);
        });

        showFiche(0);
    }

    var revisionMode = false;

    // Mots "vides" (articles, prépositions) qu'on ne cache pas car pas utiles pour la révision
    const stopWords = new Set(['le','la','les','l','un','une','des','de','du','d','et','ou','à','a','en','au','aux','par','pour','avec','dans','sur','est','sont','ce','se','ne','pas','que','qui','son','sa','ses','il','elle','on','nous','vous','ils','elles','être','avoir','faire','plus','très','aussi','mais','car','donc','si','y','cette','ces','tout','tous','toute','toutes','peut','entre','même','vers','chez','sans','avant','après','comme','bien','peu','trop','moins','lors','dont','où','n','s','c','qu','j','m','t','alors','puis','deux','trois','non','oui','chaque','quel','quelle','quels','autre','autres','sous']);

    // Tags protégés = indices visibles (ne jamais cacher)
    const protectedTags = new Set(['TH', 'STRONG', 'B', 'H3', 'H4']);
    var blankCounter = 0;

    function getBlankLetter(n) {
        // A, B, C... Z, AA, AB...
        let s = '';
        do {
            s = String.fromCharCode(65 + (n % 26)) + s;
            n = Math.floor(n / 26) - 1;
        } while (n >= 0);
        return s;
    }

    // Transformer le HTML en exercice à trous
    function blurContentHTML(htmlStr, heading) {
        const temp = document.createElement('div');
        temp.innerHTML = htmlStr;

        function isInsideProtected(node) {
            let p = node.parentElement;
            while (p && p !== temp) {
                if (protectedTags.has(p.tagName)) return true;
                if (p.classList && p.classList.contains('hl')) return true;
                p = p.parentElement;
            }
            return false;
        }

        function processNode(node) {
            if (node.nodeType === 3) { // Noeud texte
                const text = node.textContent;
                if (!text.trim()) return node;
                if (isInsideProtected(node)) return node;

                // Grouper les mots importants consécutifs en un seul trou
                const frag = document.createDocumentFragment();
                const words = text.split(/(\s+)/);
                let groupWords = [];
                let groupParts = [];

                function flushGroup() {
                    if (groupWords.length === 0) return;
                    const answer = groupParts.join('');
                    blankCounter++;
                    const span = document.createElement('span');
                    span.className = 'rev-blank';
                    span.dataset.answer = answer;
                    span.textContent = '';
                    frag.appendChild(span);
                    groupWords = [];
                    groupParts = [];
                }

                words.forEach(part => {
                    if (/^\s+$/.test(part)) {
                        if (groupWords.length > 0) {
                            groupParts.push(part);
                        } else {
                            frag.appendChild(document.createTextNode(part));
                        }
                        return;
                    }
                    const clean = part.replace(/[.,;:!?()→=\[\]«»"''/\\⚠️]/g, '').toLowerCase();
                    const isStop = stopWords.has(clean) || clean.length <= 2;
                    const isNumber = /\d/.test(clean);

                    if (isStop || isNumber) {
                        flushGroup();
                        frag.appendChild(document.createTextNode(part));
                    } else {
                        groupWords.push(clean);
                        groupParts.push(part);
                    }
                });
                flushGroup();
                return frag;
            }

            // Ne pas toucher aux tags protégés
            if (node.nodeType === 1 && (protectedTags.has(node.tagName) || (node.classList && node.classList.contains('hl')))) {
                return node;
            }

            const children = [...node.childNodes];
            children.forEach(child => {
                const result = processNode(child);
                if (result !== child) {
                    node.replaceChild(result, child);
                }
            });
            return node;
        }

        processNode(temp);
        return temp.innerHTML;
    }

    function showFiche(index) {
        activeIndex = index;
        const f = fiches[index];

        // Update sidebar active
        document.querySelectorAll('.fiche-list-item').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });

        // Update card
        cardTitle.textContent = f.title;
        const today = new Date();
        const dateStr = today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        cardMeta.textContent = `Dernière révision · ${dateStr} · ${f.time} de lecture`;

        let html = '';
        blankCounter = 0; // Reset pour chaque fiche
        f.sections.forEach(sec => {
            html += `<div class="fiche-section-title"><h3>${sec.heading}</h3><span class="section-line"></span></div>`;
            if (revisionMode) {
                html += blurContentHTML(sec.html, sec.heading);
            } else {
                html += sec.html;
            }
        });
        cardContent.innerHTML = html;

        // En mode révision : révéler ~50% des mots aléatoirement
        if (revisionMode) {
            const blanks = cardContent.querySelectorAll('.rev-blank');
            const indices = [...Array(blanks.length).keys()];
            // Mélanger Fisher-Yates
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            // Révéler la première moitié (aléatoire)
            const revealCount = Math.floor(blanks.length * 0.5);
            const toReveal = new Set(indices.slice(0, revealCount));
            blanks.forEach((b, i) => {
                if (toReveal.has(i)) {
                    b.textContent = b.dataset.answer;
                    b.classList.add('rev-revealed');
                }
            });
        }

        // Scroll card to top
        document.querySelector('.fiche-card-body').scrollTop = 0;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- Mot de passe révision ---
    const btnRevMode = document.getElementById('btnRevisionMode');
    const pwdModal = document.getElementById('revPwdModal');
    const pwdBackdrop = document.getElementById('revPwdBackdrop');
    const pwdInput = document.getElementById('revPwdInput');
    const pwdError = document.getElementById('revPwdError');
    const pwdSubmit = document.getElementById('revPwdSubmit');

    btnRevMode.addEventListener('change', () => {
        if (btnRevMode.checked) {
            if (revisionUnlocked) {
                revisionMode = true;
                showFiche(activeIndex);
            } else {
                btnRevMode.checked = false;
                pwdModal.classList.add('open');
                pwdInput.value = '';
                pwdError.textContent = '';
                setTimeout(() => pwdInput.focus(), 200);
            }
        } else {
            revisionMode = false;
            showFiche(activeIndex);
        }
    });

    // Bouton pour re-mélanger les mots cachés (clic sur le label "Révision")
    document.querySelector('.rev-switch-label').addEventListener('click', () => {
        if (revisionMode) {
            showFiche(activeIndex); // Re-génère avec un nouveau mélange aléatoire
        }
    });

    pwdBackdrop.addEventListener('click', () => pwdModal.classList.remove('open'));

    async function unlockRevision() {
        if (pwdInput.value === 'picasso32') {
            revisionUnlocked = true;
            localStorage.setItem('revisionUnlocked', '1');
            // Sauvegarder dans Firestore si connecté
            if (currentUser) {
                try {
                    const userRef = doc(db, 'users', currentUser.uid);
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        await updateDoc(userRef, { revisionUnlocked: true });
                    } else {
                        await setDoc(userRef, { revisionUnlocked: true, quizResults: [] });
                    }
                } catch(e) {}
            }
            pwdModal.classList.remove('open');
            revisionMode = true;
            btnRevMode.checked = true;
            showFiche(activeIndex);
        } else {
            pwdError.textContent = 'Mot de passe incorrect';
            pwdInput.classList.add('shake');
            setTimeout(() => pwdInput.classList.remove('shake'), 500);
        }
    }

    // Event delegation pour les blanks (les listeners sur innerHTML sont perdus)
    cardContent.addEventListener('click', function(e) {
        const blank = e.target.closest('.rev-blank');
        if (blank && !blank.classList.contains('rev-revealed')) {
            blank.textContent = blank.dataset.answer;
            blank.classList.add('rev-revealed');
        }
    });

    pwdSubmit.addEventListener('click', unlockRevision);
    pwdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') unlockRevision();
    });

    // --- Vidéo verrouillée ---
    const videoUnlocked = localStorage.getItem('videoUnlocked') === '1';

    // Déverrouiller automatiquement si déjà fait
    function checkVideoUnlock() {
        if (videoUnlocked) {
            document.querySelectorAll('.fiche-video-lock').forEach(el => {
                el.querySelector('.video-placeholder').style.display = 'none';
                el.querySelector('.video-content').style.display = 'block';
            });
        }
    }

    // Appelé après showFiche
    const origShowFiche = showFiche;

    window.promptVideoPassword = function(btn) {
        const lockEl = btn.closest('.fiche-video-lock');
        // Créer un mini prompt inline
        const existing = lockEl.querySelector('.video-pwd-inline');
        if (existing) { existing.querySelector('input').focus(); return; }

        const div = document.createElement('div');
        div.className = 'video-pwd-inline';
        div.innerHTML = `
            <input type="password" placeholder="Mot de passe" class="video-pwd-input" autocomplete="off">
            <button class="video-pwd-go">OK</button>
            <span class="video-pwd-err"></span>
        `;
        btn.parentElement.appendChild(div);
        const inp = div.querySelector('input');
        const goBtn = div.querySelector('.video-pwd-go');
        const err = div.querySelector('.video-pwd-err');
        inp.focus();

        function tryUnlock() {
            if (inp.value === 'picasso32') {
                localStorage.setItem('videoUnlocked', '1');
                lockEl.querySelector('.video-placeholder').style.display = 'none';
                lockEl.querySelector('.video-content').style.display = 'block';
            } else {
                err.textContent = 'Incorrect';
                inp.classList.add('shake');
                setTimeout(() => inp.classList.remove('shake'), 500);
            }
        }
        goBtn.addEventListener('click', tryUnlock);
        inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
    };

    // Après chaque rendu, vérifier les vidéos
    const _origCardSet = Object.getOwnPropertyDescriptor(HTMLElement.prototype, 'innerHTML');
    // Simple observer pour auto-unlock après render
    const observer = new MutationObserver(() => { if (videoUnlocked) checkVideoUnlock(); });
    observer.observe(cardContent, { childList: true });

    // Bouton suivant
    document.getElementById('btnNext').addEventListener('click', () => {
        if (fiches.length > 0) {
            showFiche((activeIndex + 1) % fiches.length);
        }
    });

    // Recherche
    document.getElementById('ficheSearchInput').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll('.fiche-list-item').forEach((el, i) => {
            const title = fiches[i].title.toLowerCase();
            el.style.display = title.includes(q) ? '' : 'none';
        });
    });

    </script>

</body>
</html>
