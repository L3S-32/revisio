<body>

    <div class="fiche-page">

        <!-- TOP BAR -->

            <p class="fiche-module-label" id="ficheModuleLabel">MODULE</p>
        </div>

        <!-- LAYOUT 2 COLONNES -->
        <div class="fiche-layout">

            <!-- SIDEBAR GAUCHE -->
            <div class="fiche-sidebar">
                <div class="fiche-search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

                </div>
                <div class="fiche-list" id="ficheList"></div>
            </div>

            <!-- CONTENU DROITE -->
            <div class="fiche-main">
                <div class="fiche-card-container">
                    <!-- Header -->
                    <div class="fiche-card-header">
                        <span class="fiche-card-badge" id="ficheBadge">MODULE</span>
                        <div class="fiche-card-actions">

                            </button>
                            <button id="btnBack" title="Retour au module">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 8 8 12 12 16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>
                            </button>
                        </div>
                    </div>
                    <!-- Body -->
                    <div class="fiche-card-body" id="ficheCardBody">
                        <h1 class="fiche-card-title" id="ficheCardTitle">—</h1>
                        <p class="fiche-card-meta" id="ficheCardMeta">—</p>
                        <div id="ficheCardContent"></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- RETOUR -->
        <div class="fiche-back-bar">
            <a href="#" class="fiche-back-btn" id="ficheBackBtn">Retour <span>←</span></a>
        </div>

    </div>

    const params = new URLSearchParams(window.location.search);
    const moduleName = params.get('name') || 'Module';
    const moduleCode = params.get('code') || '';

    document.getElementById('ficheModuleLabel').textContent = moduleCode ? `${moduleCode} · ${moduleName}` : moduleName.toUpperCase();
    document.getElementById('ficheBadge').textContent = moduleCode || moduleName.toUpperCase();
    document.title = `Revisfredo — ${moduleName}`;

    // Retour
    document.getElementById('ficheBackBtn').addEventListener('click', e => {
        e.preventDefault();
        window.location.href = `module.html?name=${encodeURIComponent(moduleName)}&code=${encodeURIComponent(moduleCode)}`;
    });
    document.getElementById('btnBack').addEventListener('click', () => {
        window.location.href = `module.html?name=${encodeURIComponent(moduleName)}&code=${encodeURIComponent(moduleCode)}`;
    });

    const ficheList = document.getElementById('ficheList');
    const cardTitle = document.getElementById('ficheCardTitle');
    const cardMeta = document.getElementById('ficheCardMeta');
    const cardContent = document.getElementById('ficheCardContent');

    const fiches = fichesData[moduleName] || [];
    let activeIndex = 0;

    if (fiches.length === 0) {
        ficheList.innerHTML = '<p style="padding:16px;color:var(--text-muted);font-size:14px;">Aucune fiche disponible pour ce module.</p>';
        cardTitle.textContent = 'Pas encore de contenu';
        cardMeta.textContent = '';
        cardContent.innerHTML = '<p>Le contenu sera bientôt ajouté.</p>';
    } else {
        // Construire la sidebar
        fiches.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'fiche-list-item' + (i === 0 ? ' active' : '');
            div.innerHTML = `
                <h4>${f.title}</h4>
                <div class="fiche-list-meta">
                    <span class="meta-dot"></span>
                    ${moduleName} · ${f.time}
                </div>
            `;
            div.addEventListener('click', () => showFiche(i));
            ficheList.appendChild(div);
        });

        showFiche(0);
    }

    function showFiche(index) {
        activeIndex = index;
        const f = fiches[index];

        // Update sidebar active
        document.querySelectorAll('.fiche-list-item').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });

        // Update card
        cardTitle.textContent = f.title;
        const today = new Date();
        const dateStr = today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        cardMeta.textContent = `Dernière révision · ${dateStr} · ${f.time} de lecture`;

        let html = '';
        f.sections.forEach(sec => {
            html += `<div class="fiche-section-title"><h3>${sec.heading}</h3><span class="section-line"></span></div>`;
            html += sec.html;
        });
        cardContent.innerHTML = html;

        // Scroll card to top
        document.querySelector('.fiche-card-body').scrollTop = 0;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Bouton suivant
    document.getElementById('btnNext').addEventListener('click', () => {
        if (fiches.length > 0) {
            showFiche((activeIndex + 1) % fiches.length);
        }
    });

    // Recherche
    document.getElementById('ficheSearchInput').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll('.fiche-list-item').forEach((el, i) => {
            const title = fiches[i].title.toLowerCase();
            el.style.display = title.includes(q) ? '' : 'none';
        });
    });
